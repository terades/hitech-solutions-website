name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject auth configuration
        env:
          ENABLE_AUTH: ${{ vars.ENABLE_AUTH }}
          AUTH_PASSWORD_HASH: ${{ vars.AUTH_PASSWORD_HASH }}
        run: |
          ENABLE="${ENABLE_AUTH:-false}"
          HASH="${AUTH_PASSWORD_HASH:-}"

          if [ "$ENABLE" = "true" ] && [ -z "$HASH" ]; then
            echo "::error::ENABLE_AUTH is 'true' but AUTH_PASSWORD_HASH is not set. Set the variable in GitHub → Settings → Variables."
            exit 1
          fi

          sed -i "s|__ENABLE_AUTH__|${ENABLE}|g" js/auth.js
          sed -i "s|__AUTH_PASSWORD_HASH__|${HASH}|g" js/auth.js

          # When auth is active, block all crawlers so content doesn't appear in search results
          if [ "$ENABLE" = "true" ]; then
            printf 'User-agent: *\nDisallow: /\n' > robots.txt
            echo "Auth enabled: robots.txt set to Disallow all"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
